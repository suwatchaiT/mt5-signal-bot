name: Signal check

on:
  schedule:
    # Alert window 9:00-17:00 Thailand (UTC+7) = 02:00-10:00 UTC
    - cron: "*/15 2-9 * * *"
    - cron: "0 10 * * *"
    # Daily status report at 8:30 Thailand = 01:30 UTC
    - cron: "30 1 * * *"
  workflow_dispatch:

concurrency:
  group: signal-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: signal-state-${{ github.run_id }}
          restore-keys: signal-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_once.py

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: signal-state-${{ github.run_id }}
